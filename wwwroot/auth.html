<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Войти — CineVault</title>
<link rel="stylesheet" href="/css/style.css">
<style>
body{background:radial-gradient(ellipse at 30% 50%,rgba(245,197,24,.06) 0%,transparent 60%),radial-gradient(ellipse at 70% 20%,rgba(230,57,70,.06) 0%,transparent 60%),var(--bg)}
.particles{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.particle{position:absolute;border-radius:50%;opacity:.15;animation:float linear infinite}
@keyframes float{0%{transform:translateY(100vh) scale(0)}100%{transform:translateY(-100px) scale(1);opacity:0}}
.auth-page{position:relative;z-index:1}
.check{color:var(--green);font-size:.85rem;margin-top:6px;display:flex;align-items:center;gap:4px}
.strength-bar{height:3px;border-radius:2px;margin-top:6px;transition:.3s;background:var(--brd)}
.strength-bar.weak{background:var(--red)}
.strength-bar.medium{background:var(--gold);width:60%!important}
.strength-bar.strong{background:var(--green)}
</style>
</head>
<body>
<div class="particles" id="particles"></div>
<div class="auth-page">
  <div style="position:absolute;top:20px;left:24px"><a href="/index.html" class="back-btn" style="font-size:.9rem">← На главную</a></div>
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px">
    <div class="auth-card">
      <div class="auth-logo">🎬 CineVault</div>
      <p style="text-align:center;color:var(--txt2);font-size:.9rem;margin-bottom:24px">Войдите, чтобы продолжить</p>

      <div class="auth-tabs">
        <div class="auth-tab active" id="loginTab" onclick="switchTab('login')">Войти</div>
        <div class="auth-tab" id="registerTab" onclick="switchTab('register')">Регистрация</div>
      </div>

      <!-- LOGIN FORM -->
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" id="loginEmail" type="email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" style="display:flex;justify-content:space-between">
            Пароль <a href="#" style="color:var(--gold);font-size:.8rem">Забыли?</a>
          </label>
          <input class="form-input" id="loginPassword" type="password" placeholder="••••••••" required>
          <div class="form-error" id="loginError" style="display:none"></div>
        </div>
        <label style="display:flex;align-items:center;gap:8px;font-size:.85rem;color:var(--txt2);margin-bottom:16px;cursor:pointer">
          <input type="checkbox" style="accent-color:var(--gold)"> Запомнить меня
        </label>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:14px">Войти</button>
      </form>

      <!-- REGISTER FORM -->
      <form id="registerForm" style="display:none" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label class="form-label">Имя</label>
          <input class="form-input" id="regName" type="text" placeholder="Иван Иванов" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" id="regEmail" type="email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Пароль</label>
          <input class="form-input" id="regPassword" type="password" placeholder="Минимум 8 символов" required oninput="checkStrength(this.value)">
          <div class="strength-bar" id="strengthBar" style="width:0%"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Подтвердите пароль</label>
          <input class="form-input" id="regPassword2" type="password" placeholder="••••••••" required>
          <div class="form-error" id="regError" style="display:none"></div>
        </div>
        <label style="display:flex;align-items:flex-start;gap:8px;font-size:.82rem;color:var(--txt2);margin-bottom:16px;cursor:pointer;line-height:1.4">
          <input type="checkbox" id="agreeCheck" style="accent-color:var(--gold);margin-top:2px" required>
          Я принимаю <a href="#" style="color:var(--gold)">Условия использования</a> и <a href="#" style="color:var(--gold)">Политику конфиденциальности</a>
        </label>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:14px">Создать аккаунт</button>
      </form>

      <div class="auth-divider">или</div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <button class="social-btn" onclick="socialLogin('Google')">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.6 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 2.9l5.7-5.7C34 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.9z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.8 19 13 24 13c3.1 0 5.8 1.1 8 2.9l5.7-5.7C34 6.1 29.3 4 24 4 16.3 4 9.6 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.3 35.3 26.8 36 24 36c-5.2 0-9.7-3.4-11.3-8l-6.5 5C9.6 39.6 16.3 44 24 44z"/><path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.3 5.7l6.2 5.2C37 38.5 44 33 44 24c0-1.3-.1-2.7-.4-3.9z"/></svg>
          Продолжить с Google
        </button>
        <button class="social-btn" onclick="socialLogin('ВКонтакте')">
          <svg width="18" height="18" viewBox="0 0 32 32"><rect width="32" height="32" rx="6" fill="#0077FF"/><path fill="#fff" d="M17.2 22h-1.9s-.6 0-.6-.8V16s-.1-1-.8-1.1c-.7-.1-1.8 1.3-1.8 1.3s-2 2.6-2.6 3.5c-.4.6-1.1.3-1.1.3H7.2s-.9 0-.5-.9 2.3-3.7 2.3-3.7 1.8-2.6 0-1.9c0 0-.9.4-1.4.5-.5.1-.9-.6-.9-.6s-.3-.8.5-1.2 2.9-1.2 4.9-.9 1.9 2.1 1.9 2.1v3.5s-.1.8.4.5 1.9-2.4 1.9-2.4 1-1.5 1.5-1.4h2.2s.8-.1.2 1-.3.6-2 2.4c0 0-1.2 1.3-.2 2.1l2.5 2.6s.9.8.1.8z"/></svg>
          Продолжить с ВКонтакте
        </button>
      </div>
    </div>
  </div>
</div>

<script src="/js/data.js"></script>
<script src="/js/api.js"></script>
<script>
// Particles bg
const pc = document.getElementById('particles');
for(let i=0;i<12;i++){
  const p=document.createElement('div');
  p.className='particle';
  const size=Math.random()*8+4;
  p.style.cssText=`width:${size}px;height:${size}px;left:${Math.random()*100}%;background:${Math.random()>.5?'#f5c518':'#e63946'};animation-duration:${Math.random()*15+10}s;animation-delay:${Math.random()*10}s`;
  pc.appendChild(p);
}

// Check if already logged in
if(getCurrentUser()) window.location.href='/account.html';

// Switch tab
const params = new URLSearchParams(location.search);
if(params.get('tab')==='register') switchTab('register');

function switchTab(tab){
  document.getElementById('loginForm').style.display = tab==='login'?'block':'none';
  document.getElementById('registerForm').style.display = tab==='register'?'block':'none';
  document.getElementById('loginTab').classList.toggle('active', tab==='login');
  document.getElementById('registerTab').classList.toggle('active', tab==='register');
}

function checkStrength(pwd){
  const bar = document.getElementById('strengthBar');
  if(pwd.length<6){bar.className='strength-bar weak';bar.style.width='30%'}
  else if(pwd.length<10||!/[A-Z]/.test(pwd)||!/[0-9]/.test(pwd)){bar.className='strength-bar medium';bar.style.width='60%'}
  else{bar.className='strength-bar strong';bar.style.width='100%'}
}

// POST /api/auth/login
async function handleLogin(e){
  e.preventDefault();
  const btn = e.target.querySelector('button[type=submit]');
  btn.textContent = 'Вход...';
  btn.disabled = true;
  try {
    await apiLogin(
      document.getElementById('loginEmail').value,
      document.getElementById('loginPassword').value
    );
    const redirect = params.get('redirect') || '/index.html';
    window.location.href = redirect;
  } catch(err) {
    const errEl = document.getElementById('loginError');
    errEl.textContent = err.message;
    errEl.style.display = 'block';
    btn.textContent = 'Войти';
    btn.disabled = false;
  }
}

// POST /api/auth/register
async function handleRegister(e){
  e.preventDefault();
  const pwd = document.getElementById('regPassword').value;
  const pwd2 = document.getElementById('regPassword2').value;
  const err = document.getElementById('regError');
  if(pwd !== pwd2){ err.textContent='Пароли не совпадают'; err.style.display='block'; return; }
  if(pwd.length < 8){ err.textContent='Пароль минимум 8 символов'; err.style.display='block'; return; }
  const btn = e.target.querySelector('button[type=submit]');
  btn.textContent = 'Создание...';
  btn.disabled = true;
  try {
    await apiRegister(
      document.getElementById('regName').value,
      document.getElementById('regEmail').value,
      pwd
    );
    window.location.href = '/account.html';
  } catch(e2){
    err.textContent = e2.message;
    err.style.display = 'block';
    btn.textContent = 'Создать аккаунт';
    btn.disabled = false;
  }
}

function socialLogin(provider){
  const user={id:Date.now(),name:'Тестовый пользователь',email:`test@${provider.toLowerCase()}.com`,provider,createdAt:new Date().toISOString()};
  const users=JSON.parse(localStorage.getItem('users')||'[]');
  users.push(user);
  localStorage.setItem('users',JSON.stringify(users));
  localStorage.setItem('currentUser',JSON.stringify(user));
  window.location.href='/index.html';
}
</script>
</body>
</html>
